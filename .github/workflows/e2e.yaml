on:
  workflow_dispatch: {}

name: e2e

env:
  REGISTRY: ghcr.io
  TARGET_IMAGE: ghcr.io/txpipe/oura-e2e:${{ github.sha }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          # e2e only runs on the GitHub-hosted linux/amd64 runners, so we skip
          # the armv7 cross-build that the release pipeline produces.
          platforms: linux/amd64
          push: true
          tags: ${{ env.TARGET_IMAGE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  test:
    needs: ["build"]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: assert-n2c-preview-origin-blocks
            kind: n2c
          - name: assert-n2c-preview-tip-blocks
            kind: n2c
          - name: assert-n2n-mainnet-origin-blocks
            kind: n2n
          - name: assert-n2n-mainnet-tip-blocks
            kind: n2n
          - name: assert-n2n-preview-origin-blocks
            kind: n2n
          - name: assert-n2n-preview-tip-blocks
            kind: n2n
          - name: aws-lambda-10-blocks
            kind: aws
          - name: aws-s3-500-blocks
            kind: aws
          - name: aws-sqs-10-blocks
            kind: aws

    # n2c relies on a Demeter `dmtrcli` port-forward that is still being finalized,
    # so allow those legs to fail without failing the whole suite.
    continue-on-error: ${{ matrix.kind == 'n2c' }}

    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull image
        run: docker pull "$TARGET_IMAGE"

      # --- AWS credentials (s3 / sqs / lambda sinks) ---------------------------
      - name: Configure AWS credentials
        if: matrix.kind == 'aws'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-west-2
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/OuraE2ETest
          role-session-name: Github-e2e-Rollout
          role-duration-seconds: 3600

      # n2c reaches a Demeter-managed node socket via a dmtrcli port-forward.
      - name: Set up dmtrcli node socket (n2c)
        if: matrix.kind == 'n2c'
        env:
          DMTR_API_KEY: ${{ secrets.DMTR_API_KEY }}
        run: .github/e2e/scripts/setup-dmtr-socket.sh

      - name: Run ${{ matrix.name }}
        env:
          TEST_NAME: ${{ matrix.name }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          KIND: ${{ matrix.kind }}
        run: .github/e2e/scripts/run-test.sh

      - name: Stop dmtrcli tunnel (n2c)
        if: always() && matrix.kind == 'n2c'
        run: .github/e2e/scripts/stop-dmtr-tunnel.sh
