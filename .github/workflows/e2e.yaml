on:
  workflow_dispatch: {}

name: e2e

env:
  REGISTRY: ghcr.io
  TARGET_IMAGE: ghcr.io/txpipe/oura-e2e:${{ github.sha }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          # e2e only runs on the GitHub-hosted linux/amd64 runners, so we skip
          # the armv7 cross-build that the release pipeline produces.
          platforms: linux/amd64
          push: true
          tags: ${{ env.TARGET_IMAGE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  test:
    needs: ["build"]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: assert-n2c-preview-origin-blocks
            kind: n2c
          - name: assert-n2c-preview-tip-blocks
            kind: n2c
          - name: assert-n2n-mainnet-origin-blocks
            kind: n2n
          - name: assert-n2n-mainnet-tip-blocks
            kind: n2n
          - name: assert-n2n-preview-origin-blocks
            kind: n2n
          - name: assert-n2n-preview-tip-blocks
            kind: n2n
          - name: aws-lambda-10-blocks
            kind: aws
          - name: aws-s3-500-blocks
            kind: aws
          - name: aws-sqs-10-blocks
            kind: aws

    # n2c relies on a Demeter `dmtrcli` port-forward that is still being finalized,
    # so allow those legs to fail without failing the whole suite.
    continue-on-error: ${{ matrix.kind == 'n2c' }}

    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull image
        run: docker pull "$TARGET_IMAGE"

      # --- AWS credentials (s3 / sqs / lambda sinks) ---------------------------
      - name: Configure AWS credentials
        if: matrix.kind == 'aws'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-west-2
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/OuraE2ETest
          role-session-name: Github-e2e-Rollout
          role-duration-seconds: 3600

      # --- n2c: expose a node socket via Demeter dmtrcli ----------------------
      # PLACEHOLDER: the exact dmtrcli auth/port-forward invocation must be
      # confirmed against the real CLI. These legs are continue-on-error.
      - name: Set up dmtrcli node socket (n2c)
        if: matrix.kind == 'n2c'
        env:
          DMTR_API_KEY: ${{ secrets.DMTR_API_KEY }}
        run: |
          set -euo pipefail
          curl -fsSL https://raw.githubusercontent.com/demeter-run/cli/main/install.sh | sh
          mkdir -p "${RUNNER_TEMP}/sockets"
          dmtrcli auth login --api-key "${DMTR_API_KEY}"
          # Forward the managed Cardano node's n2c socket onto the runner host.
          dmtrcli ports tunnel \
            --unix-socket "${RUNNER_TEMP}/sockets/node0.socket" &
          echo "DMTR_TUNNEL_PID=$!" >> "$GITHUB_ENV"
          # Wait for the socket to appear before starting oura.
          for i in $(seq 1 30); do
            if [ -S "${RUNNER_TEMP}/sockets/node0.socket" ]; then break; fi
            sleep 2
          done

      # --- run the test --------------------------------------------------------
      - name: Run ${{ matrix.name }}
        env:
          TEST_NAME: ${{ matrix.name }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          KIND: ${{ matrix.kind }}
        run: |
          set -euo pipefail

          # Resolve placeholders (e.g. the s3 prefix) into the final config.
          envsubst < ".github/e2e/configs/${TEST_NAME}.toml" > "${RUNNER_TEMP}/daemon.toml"
          echo "----- resolved daemon.toml -----"
          cat "${RUNNER_TEMP}/daemon.toml"
          echo "--------------------------------"

          docker_args=(
            --rm
            -e RUST_LOG=warn
            -v "${RUNNER_TEMP}/daemon.toml:/etc/oura/daemon.toml:ro"
          )

          if [ "$KIND" = "aws" ]; then
            docker_args+=(
              -e AWS_ACCESS_KEY_ID
              -e AWS_SECRET_ACCESS_KEY
              -e AWS_SESSION_TOKEN
              -e AWS_REGION
              -e AWS_DEFAULT_REGION
            )
          fi

          if [ "$KIND" = "n2c" ]; then
            docker_args+=( -v "${RUNNER_TEMP}/sockets:/opt/cardano/cnode/sockets" )
          fi

          # oura self-terminates via [source.finalize]; the Assert sink panics on a
          # bad block (non-zero exit). `timeout` guards against a hang (exit 124).
          timeout 1800 docker run "${docker_args[@]}" "$TARGET_IMAGE" daemon

      - name: Stop dmtrcli tunnel (n2c)
        if: always() && matrix.kind == 'n2c'
        run: kill "${DMTR_TUNNEL_PID}" 2>/dev/null || true
