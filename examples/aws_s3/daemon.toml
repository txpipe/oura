[source]
type = "N2N"
peers = ["backbone.mainnet.cardanofoundation.org:3001"]

[chain]
type = "mainnet"

[intersect]
type = "Tip"

# The AwsS3 sink stores the raw block CBOR, so the block must reach it unparsed
# (no ParseCbor / SplitBlock filter).

[sink]
type = "AwsS3"
region = "us-east-1"
bucket = "my-bucket"
prefix = "mainnet/"
